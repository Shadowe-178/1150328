<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>清明節占卜遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: '微軟正黑體', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .title {
            font-size: 2.5em;
            color: #2c3e50;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .emoji {
            font-size: 3em;
            margin: 20px 0;
        }

        .content {
            margin: 30px 0;
        }

        .divider {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            margin: 20px auto;
        }

        /* 遊戲開始頁面 */
        .home-screen {
            display: block;
        }

        .hidden {
            display: none !important;
        }

        .intro-text {
            font-size: 1.1em;
            color: #34495e;
            line-height: 1.8;
            margin: 20px 0;
        }

        /* 問題卡片 */
        .question-card {
            background: #f8f9fa;
            padding: 30px 20px;
            border-radius: 15px;
            margin: 30px 0;
        }

        .question-text {
            font-size: 1.3em;
            color: #2c3e50;
            margin: 20px 0;
            font-weight: bold;
        }

        /* 按鈕樣式 */
        .button-group {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-option {
            background: #3498db;
            padding: 15px 20px;
        }

        .btn-option:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-restart {
            background: #27ae60;
            margin-top: 30px;
        }

        .btn-restart:hover {
            background: #229954;
        }

        /* 結果卡片 */
        .result-card {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            padding: 40px 20px;
            border-radius: 15px;
            margin: 30px 0;
            border-left: 5px solid #e74c3c;
        }

        .result-title {
            font-size: 2em;
            color: #c0392b;
            margin: 20px 0;
            font-weight: bold;
        }

        .result-text {
            font-size: 1.1em;
            color: #34495e;
            line-height: 1.8;
            margin: 20px 0;
        }

        .luck-level {
            font-size: 1.3em;
            margin: 20px 0;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e74c3c;
        }

        /* 進度條 */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 10px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            color: #7f8c8d;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* 運勢圖表 */
        .fortune-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-top: 4px solid #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #667eea;
        }

        /* 動畫 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .spinning {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 首頁 -->
        <div id="homeScreen" class="home-screen">
            <div class="header">
                <div class="emoji">🪦</div>
                <div class="title">清明節占卜</div>
                <div class="subtitle">探尋祖先的指引</div>
                <div class="divider"></div>
            </div>

            <div class="content">
                <p class="intro-text">
                    清明時節，正是與祖先相通之際。<br>
                    讓我們通過占卜，探尋今年你的運勢與祈願！
                </p>
                <p class="intro-text" style="color: #95a5a6; font-size: 0.95em;">
                    ⚠️ 此遊戲純為娛樂，請勿迷信
                </p>
            </div>

            <button class="btn btn-primary" onclick="startGame()" style="width: 100%;">
                開始占卜
            </button>
        </div>

        <!-- 問題1 -->
        <div id="question1Screen" class="hidden">
            <div class="header">
                <div class="emoji">🔮</div>
                <div class="title">占卜開始</div>
                <div class="divider"></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" style="width: 25%;"></div>
            </div>
            <div class="progress-text">第 1/4 題</div>

            <div class="question-card">
                <div class="question-text">今年你最希望祖先保佑什麼？</div>
            </div>

            <div class="button-group">
                <button class="btn btn-option" onclick="selectAnswer1('health')">
                    💚 身體健康
                </button>
                <button class="btn btn-option" onclick="selectAnswer1('wealth')">
                    💰 財運興隆
                </button>
                <button class="btn btn-option" onclick="selectAnswer1('love')">
                    💕 愛情和諧
                </button>
                <button class="btn btn-option" onclick="selectAnswer1('success')">
                    🌟 事業成功
                </button>
            </div>
        </div>

        <!-- 問題2 -->
        <div id="question2Screen" class="hidden">
            <div class="header">
                <div class="emoji">🙏</div>
                <div class="title">心靈對話</div>
                <div class="divider"></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" style="width: 50%;"></div>
            </div>
            <div class="progress-text">第 2/4 題</div>

            <div class="question-card">
                <div class="question-text">今年你的心態如何？</div>
            </div>

            <div class="button-group">
                <button class="btn btn-option" onclick="selectAnswer2('positive')">
                    🌞 樂觀積極
                </button>
                <button class="btn btn-option" onclick="selectAnswer2('moderate')">
                    😌 平和穩定
                </button>
                <button class="btn btn-option" onclick="selectAnswer2('cautious')">
                    ⚠️ 謹慎小心
                </button>
                <button class="btn btn-option" onclick="selectAnswer2('uncertain')">
                    🌀 迷茫困頓
                </button>
            </div>
        </div>

        <!-- 問題3 -->
        <div id="question3Screen" class="hidden">
            <div class="header">
                <div class="emoji">🌸</div>
                <div class="title">運勢感知</div>
                <div class="divider"></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" style="width: 75%;"></div>
            </div>
            <div class="progress-text">第 3/4 題</div>

            <div class="question-card">
                <div class="question-text">最近發生了什麼有趣的事嗎？</div>
            </div>

            <div class="button-group">
                <button class="btn btn-option" onclick="selectAnswer3('yes')">
                    ✨ 有呢，很開心
                </button>
                <button class="btn btn-option" onclick="selectAnswer3('neutral')">
                    😐 還好，普普通通
                </button>
                <button class="btn btn-option" onclick="selectAnswer3('challenge')">
                    😤 有些挑戰和困難
                </button>
                <button class="btn btn-option" onclick="selectAnswer3('unknown')">
                    🤔 還沒想清楚
                </button>
            </div>
        </div>

        <!-- 問題4 -->
        <div id="question4Screen" class="hidden">
            <div class="header">
                <div class="emoji">💫</div>
                <div class="title">最後祈願</div>
                <div class="divider"></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" style="width: 100%;"></div>
            </div>
            <div class="progress-text">第 4/4 題</div>

            <div class="question-card">
                <div class="question-text">這次占卜時，你的心願最重要的是？</div>
            </div>

            <div class="button-group">
                <button class="btn btn-option" onclick="selectAnswer4('wish')">
                    🙏 誠心祈願
                </button>
                <button class="btn btn-option" onclick="selectAnswer4('seek')">
                    🔍 尋求指引
                </button>
                <button class="btn btn-option" onclick="selectAnswer4('gratitude')">
                    🌺 表達感恩
                </button>
                <button class="btn btn-option" onclick="selectAnswer4('fun')">
                    🎉 純粹娛樂
                </button>
            </div>
        </div>

        <!-- 結果頁面 -->
        <div id="resultScreen" class="hidden">
            <div class="header">
                <div class="emoji" id="resultEmoji">✨</div>
                <div class="title">占卜結果</div>
                <div class="divider"></div>
            </div>

            <div class="result-card">
                <div class="result-title" id="resultTitle">吉</div>
                <div class="result-text" id="resultText">
                    你的占卜結果...
                </div>
                <div class="luck-level" id="luckLevel">
                    運勢指數：80 / 100
                </div>
            </div>

            <div class="fortune-stats">
                <div class="stat-box">
                    <div class="stat-label">💰 財運</div>
                    <div class="stat-value" id="wealthStat">★★★☆☆</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">❤️ 感情</div>
                    <div class="stat-value" id="loveStat">★★★☆☆</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">💼 事業</div>
                    <div class="stat-value" id="careerStat">★★★☆☆</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">🏥 健康</div>
                    <div class="stat-value" id="healthStat">★★★★☆</div>
                </div>
            </div>

            <div style="margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px;">
                <p style="color: #7f8c8d; font-size: 0.95em; margin-bottom: 10px;">
                    💝 祖先的祝福：
                </p>
                <p style="color: #34495e; font-size: 1em; line-height: 1.8;" id="blessingText">
                    願你在新的季節裡，勇敢前行，與祖先同行...
                </p>
            </div>

            <button class="btn btn-restart" onclick="restartGame()" style="width: 100%;">
                再次占卜
            </button>
        </div>
    </div>

    <script>
        // 遊戲狀態
        let gameState = {
            answers: {},
            score: 0
        };

        // 開始遊戲
        function startGame() {
            gameState = { answers: {}, score: 0 };
            showScreen('question1Screen');
        }

        // 顯示指定屏幕
        function showScreen(screenId) {
            document.querySelectorAll('[id$="Screen"]').forEach(el => {
                el.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
            document.getElementById(screenId).classList.add('fade-in');
        }

        // 答題函數
        function selectAnswer1(answer) {
            gameState.answers.question1 = answer;
            if (answer === 'health') gameState.score += 2;
            else if (answer === 'wealth') gameState.score += 3;
            else if (answer === 'love') gameState.score += 4;
            else if (answer === 'success') gameState.score += 4;
            showScreen('question2Screen');
        }

        function selectAnswer2(answer) {
            gameState.answers.question2 = answer;
            if (answer === 'positive') gameState.score += 4;
            else if (answer === 'moderate') gameState.score += 3;
            else if (answer === 'cautious') gameState.score += 2;
            else if (answer === 'uncertain') gameState.score += 1;
            showScreen('question3Screen');
        }

        function selectAnswer3(answer) {
            gameState.answers.question3 = answer;
            if (answer === 'yes') gameState.score += 4;
            else if (answer === 'neutral') gameState.score += 2;
            else if (answer === 'challenge') gameState.score += 1;
            else if (answer === 'unknown') gameState.score += 2;
            showScreen('question4Screen');
        }

        function selectAnswer4(answer) {
            gameState.answers.question4 = answer;
            if (answer === 'wish') gameState.score += 3;
            else if (answer === 'seek') gameState.score += 3;
            else if (answer === 'gratitude') gameState.score += 5;
            else if (answer === 'fun') gameState.score += 2;
            calculateResult();
        }

        // 計算並顯示結果
        function calculateResult() {
            const score = gameState.score;
            let result = {
                emoji: '✨',
                title: '吉',
                text: '',
                health: 3,
                wealth: 3,
                love: 3,
                career: 3,
                blessing: ''
            };

            if (score >= 17) {
                result.emoji = '🌟';
                result.title = '大吉';
                result.text = '祖先眷顧！諸事順利，春風常駐於心。今年乃眾星拱月之局，無論財運、感情、事業皆有貴人相助。此年宜精進、宜開創，把握機遇，不負韶華。';
                result.health = 5;
                result.wealth = 5;
                result.love = 5;
                result.career = 5;
                result.blessing = '春意盎然，前路光明。願你如梅花歷寒而不凋，似柳絮乘風而自在。祖先祝福，護你周全。';
            } else if (score >= 14) {
                result.emoji = '☀️';
                result.title = '吉';
                result.text = '諸事向好！祖先護佑，好運眷顧。今年宜穩健運營，不急進，不躁進。機遇將至，準備妥當自會應時而生。工作事業頗順，感情因你用心而溫暖。';
                result.health = 4;
                result.wealth = 4;
                result.love = 4;
                result.career = 4;
                result.blessing = '用心浇灌，收穫果實。願你在溫和的陽光下，綻放屬於自己的光彩。';
            } else if (score >= 10) {
                result.emoji = '🌙';
                result.title = '中吉';
                result.text = '祖先護航，穩中求進。今年需要更多的耐心與智慧，機遇與挑戰並存。不妨多思考、多溝通，人際關係的修復與拓展將帶來意想不到的收穫。心靜則氣和，氣和則福至。';
                result.health = 3;
                result.wealth = 3;
                result.love = 3;
                result.career = 3;
                result.blessing = '於細節中見真章，於堅持中見光芒。願你沉靜如月，溫暖如炬。';
            } else {
                result.emoji = '🌧️';
                result.title = '平';
                result.text = '緣法普通，勿須沮喪。人生本有起伏，此段時光乃蓄勢待發之際。多積累、多成長，逆境正是修行時。祖先見你心志，自會加護。';
                result.health = 3;
                result.wealth = 2;
                result.love = 2;
                result.career = 2;
                result.blessing = '烏雲散去有晴天，堅持不懈有福音。願你在暗沉中堅守希望，靜待春天的到來。';
            }

            // 更新結果頁面
            document.getElementById('resultEmoji').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultText').textContent = result.text;
            document.getElementById('luckLevel').innerHTML = `運勢指數：${Math.min(100, score * 6)} / 100`;
            document.getElementById('wealthStat').textContent = '★'.repeat(result.wealth) + '☆'.repeat(5 - result.wealth);
            document.getElementById('loveStat').textContent = '★'.repeat(result.love) + '☆'.repeat(5 - result.love);
            document.getElementById('careerStat').textContent = '★'.repeat(result.career) + '☆'.repeat(5 - result.career);
            document.getElementById('healthStat').textContent = '★'.repeat(result.health) + '☆'.repeat(5 - result.health);
            document.getElementById('blessingText').textContent = result.blessing;

            showScreen('resultScreen');
        }

        // 重新開始
        function restartGame() {
            showScreen('homeScreen');
        }
    </script>
</body>
</html>
